# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/traefik.io/ingressroute_v1alpha1.json
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: dozzle-ingress
  namespace: monitoring
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`dozzle.ysonsbaolab.dev`)
      kind: Rule
      services:
        - name: dozzle-service
          port: 8080
  tls:
    secretName: dozzle-certificate-secret
