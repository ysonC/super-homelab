apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: couchdb
  namespace: database
spec:
  interval: 30m
  releaseName: couchdb
  chart:
    spec:
      chart: couchdb
      version: "*"
      sourceRef:
        kind: HelmRepository
        name: couchdb
        namespace: flux-system
      interval: 1h

  install:
    createNamespace: false
    remediation:
      retries: 3

  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true

  rollback:
    cleanupOnFail: true

  uninstall:
    deletionPropagation: background

  values:
    clusterSize: 1
    createAdminSecret: false
    allowAdminParty: false
    persistentVolume:
      enabled: true
      storageClass: longhorn
      size: 10Gi
    service:
      enabled: true
      type: ClusterIP
      externalPort: 5984
      targetPort: 5984
    couchdbConfig:
      couchdb:
        uuid: REPLACE_WITH_UUID
      chttpd:
        require_valid_user: true
      httpd:
        enable_cors: true
      cors:
        origins: "*"
        credentials: true
        headers: accept, authorization, content-type, origin, referer
        methods: GET, PUT, POST, HEAD, DELETE
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        memory: 1Gi
