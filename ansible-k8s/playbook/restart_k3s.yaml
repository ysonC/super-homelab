---
- name: Reboot K3s control-plane nodes
  hosts: master
  become: yes
  serial: 1
  tasks:
    - name: Ensure K3s server starts on boot
      systemd:
        name: k3s
        enabled: yes

    - name: Stop K3s server before reboot
      systemd:
        name: k3s
        state: stopped

    - name: Reboot control-plane node
      reboot:
        reboot_timeout: 300
        pre_reboot_delay: 5
        post_reboot_delay: 30
        test_command: whoami
