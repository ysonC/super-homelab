---
- name: Shutdown K3s control-plane nodes
  hosts: master
  become: yes
  tasks:
    - name: Stop K3s server
      systemd:
        name: k3s
        state: stopped
        enabled: no

    - name: Power off the control-plane node
      command: shutdown -h now
      async: 1
      poll: 0
      ignore_errors: yes
