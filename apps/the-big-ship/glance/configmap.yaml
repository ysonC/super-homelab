apiVersion: v1
kind: ConfigMap
metadata:
  name: glance-config
  namespace: apps
  labels:
    app.kubernetes.io/name: glance
data:
  glance.yml: |
    theme:
      # This will be the default theme
      background-color: 100 20 10
      primary-color: 40 90 40
      contrast-multiplier: 1.1

      disable-picker: false
      presets:
        gruvbox-dark:
          background-color: 0 0 16
          primary-color: 43 59 81
          positive-color: 61 66 44
          negative-color: 6 96 59

        zebra:
          light: true
          background-color: 0 0 95
          primary-color: 0 0 10
          negative-color: 0 90 50

    pages:
      - name: Home
        hide-desktop-navigation: false
        columns:
          - size: small
            widgets:
              - type: server-stats
                servers:
                - type: remote
                  name: 1pi5
                  url: http://10.8.8.51:27973
                  token: AfzoNal2R7BINwfci8kFA5ACDgCz3tz2

                - type: remote
                  name: 2pi5
                  url: http://10.8.8.52:27973
                  token: 7Ctv74AhgvbOso4w1rwgNydMTkHpSddy

                - type: remote
                  name: 3pi5
                  url: http://10.8.8.53:27973
                  token: ABKQK2RKcgWjm9smrnqqWxf9X5fZ9FBI

                - type: remote
                  name: TrueNas
                  url: http://10.8.8.3:27973
                  token: Vn8QxL2RHpT7mKsdYc4aWgF1ZjNb6uXE
          - size: full
            widgets:
              - type: monitor
                cache: 10m
                title: Services
