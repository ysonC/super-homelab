apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: hermes-ingress-certificate
  namespace: apps
spec:
  secretName: hermes-certificate-secret
  issuerRef:
    name: cloudflare-cluster-issuer
    kind: ClusterIssuer
  dnsNames:
    - hermes.ysonsbaolab.dev

---
apiVersion: v1
kind: Service
metadata:
  name: hermes-service
  namespace: apps
spec:
  type: ExternalName
  ports:
    - name: http
      port: 8787
      targetPort: 8787
  externalName: 10.8.8.15

---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: hermes-ingress
  namespace: apps
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`hermes.ysonsbaolab.dev`)
      kind: Rule
      services:
        - name: hermes-service
          port: 8787
  tls:
    secretName: hermes-certificate-secret
