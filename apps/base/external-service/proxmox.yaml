apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: proxmox-ingress-certificate
  namespace: apps
spec:
  secretName: proxmox-certificate-secret
  issuerRef:
    name: cloudflare-cluster-issuer
    kind: ClusterIssuer
  dnsNames:
    - proxmox.ysonsbaolab.dev

---
apiVersion: v1
kind: Service
metadata:
  name: proxmox-service
  namespace: apps
spec:
  type: ExternalName
  externalName: 10.8.8.2

---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: proxmox-ingress
  namespace: apps
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`proxmox.ysonsbaolab.dev`)
      kind: Rule
      services:
        - name: proxmox-service
          port: 8006
          scheme: https
          serversTransport: proxmox-transport
  tls:
    secretName: proxmox-certificate-secret

---
apiVersion: traefik.io/v1alpha1
kind: ServersTransport
metadata:
  name: proxmox-transport
  namespace: apps
spec:
  insecureSkipVerify: true
