apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: couchdb-ingress-certificate
  namespace: apps
spec:
  secretName: couchdb-certificate-secret
  issuerRef:
    name: cloudflare-cluster-issuer
    kind: ClusterIssuer
  dnsNames:
    - couchdb.ysonsbaolab.dev

---
apiVersion: v1
kind: Service
metadata:
  name: couchdb-service
  namespace: apps
spec:
  type: ExternalName
  externalName: 10.8.8.100

---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: couchdb-ingress
  namespace: apps
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`couchdb.ysonsbaolab.dev`)
      kind: Rule
      services:
        - name: couchdb-service
          port: 5984
  tls:
    secretName: couchdb-certificate-secret
