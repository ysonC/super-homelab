apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: openclaw-ingress-certificate
  namespace: apps
spec:
  secretName: openclaw-certificate-secret
  issuerRef:
    name: cloudflare-cluster-issuer
    kind: ClusterIssuer
  dnsNames:
    - openclaw.ysonsbaolab.dev

---
apiVersion: v1
kind: Service
metadata:
  name: openclaw-service
  namespace: apps
spec:
  type: ExternalName
  ports:
    - name: http
      port: 18789
      targetPort: 18789
  externalName: 10.8.8.100
  selector:
    app.kubernetes.io/instance: traefik
    app.kubernetes.io/name: traefik

---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: openclaw-ingress
  namespace: apps
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`openclaw.ysonsbaolab.dev`)
      kind: Rule
      services:
        - name: openclaw-service
          port: 18789
  tls:
    secretName: openclaw-certificate-secret
