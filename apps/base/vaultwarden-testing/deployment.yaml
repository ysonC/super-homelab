apiVersion: apps/v1
kind: Deployment
metadata:
  name: vaultwarden-testing
  namespace: apps
  labels:
    app: vaultwarden-testing
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: vaultwarden-testing
  template:
    metadata:
      labels:
        app: vaultwarden-testing
    spec:
      containers:
        - name: vaultwarden
          image: vaultwarden/server:1.35.8
          env:
            - name: ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: vaultwarden-secret
                  key: ADMIN_TOKEN
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 512Mi
          volumeMounts:
            - name: vaultwarden-testing-pvc-longhorn
              mountPath: /data
      volumes:
        - name: vaultwarden-testing-pvc-longhorn
          persistentVolumeClaim:
            claimName: vaultwarden-testing-pvc-longhorn
