apiVersion: v1
kind: Namespace
metadata:
  name: ai-agent

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ai-agent
  namespace: ai-agent

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ai-readonly
rules:
  # Core resources
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - services
      - endpoints
      - persistentvolumeclaims
      - persistentvolumes
      - namespaces
      - nodes
      - configmaps
      - events
    verbs:
      - get
      - list
      - watch

  # Workloads
  - apiGroups: ["apps"]
    resources:
      - deployments
      - daemonsets
      - statefulsets
      - replicasets
    verbs:
      - get
      - list
      - watch

  # Jobs
  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs:
      - get
      - list
      - watch

  # Networking
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
      - networkpolicies
    verbs:
      - get
      - list
      - watch

  # Traefik
  - apiGroups: ["traefik.io"]
    resources:
      - ingressroutes
      - middlewares
    verbs:
      - get
      - list
      - watch

  # FluxCD - Helm
  - apiGroups: ["helm.toolkit.fluxcd.io"]
    resources:
      - helmreleases
    verbs:
      - get
      - list
      - watch

  # FluxCD - Kustomize
  - apiGroups: ["kustomize.toolkit.fluxcd.io"]
    resources:
      - kustomizations
    verbs:
      - get
      - list
      - watch

  # FluxCD - Sources
  - apiGroups: ["source.toolkit.fluxcd.io"]
    resources:
      - gitrepositories
      - helmrepositories
      - buckets
    verbs:
      - get
      - list
      - watch

  # cert-manager
  - apiGroups: ["cert-manager.io"]
    resources:
      - certificates
      - certificaterequests
      - issuers
      - clusterissuers
    verbs:
      - get
      - list
      - watch

  # Prometheus Operator
  - apiGroups: ["monitoring.coreos.com"]
    resources:
      - servicemonitors
      - prometheusrules
    verbs:
      - get
      - list
      - watch

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ai-readonly
subjects:
  - kind: ServiceAccount
    name: ai-agent
    namespace: ai-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ai-readonly
